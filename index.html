<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B5E20">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Finanças Pessoais</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">

  <!-- ======= HEADER ======= -->
  <header class="app-header">
    <div class="header-top">
      <h1><i class="fa-solid fa-wallet"></i> Finanças</h1>
      <div class="header-actions">
        <button onclick="clearAllData()" title="Limpar tudo"><i class="fa-solid fa-trash-can"></i></button>
        <button onclick="resetAllData()" title="Restaurar dados da planilha"><i class="fa-solid fa-rotate-left"></i></button>
      </div>
    </div>
    <div class="month-selector">
      <button onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
      <span id="month-label">Junho 2025</span>
      <button onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </header>

  <!-- ======= BALANCE STRIP ======= -->
  <div class="balance-wrapper">
    <div class="balance-strip">
      <div class="balance-card income">
        <div class="label">Receitas</div>
        <div class="value" id="income-value">R$ 0,00</div>
      </div>
      <div class="balance-card expense">
        <div class="label">Despesas</div>
        <div class="value" id="expense-value">R$ 0,00</div>
      </div>
      <div class="balance-card total">
        <div class="label">Saldo</div>
        <div class="value" id="balance-value">R$ 0,00</div>
      </div>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- PAGE: DASHBOARD                              -->
  <!-- ============================================ -->
  <div id="page-dashboard" class="page active">

    <div class="section-title">
      <span><i class="fa-solid fa-chart-simple"></i> Evolução Mensal</span>
    </div>
    <div class="chart-container">
      <div class="chart-wrapper">
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <div class="section-title">
      <span><i class="fa-solid fa-chart-pie"></i> Despesas por Categoria</span>
    </div>
    <div class="chart-container">
      <div class="chart-wrapper pie-chart">
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <div class="section-title">
      <span><i class="fa-solid fa-bell"></i> Contas a Vencer</span>
      <button class="see-all" onclick="navigateTo('transactions')">Ver todas</button>
    </div>
    <div class="alerts-list" id="alerts-container"></div>

    <div class="section-title">
      <span><i class="fa-solid fa-list"></i> Detalhamento</span>
    </div>
    <div class="report-card" id="category-breakdown"></div>
  </div>

  <!-- ============================================ -->
  <!-- PAGE: TRANSACTIONS                           -->
  <!-- ============================================ -->
  <div id="page-transactions" class="page">
    <div class="transactions-filters">
      <div class="filter-chip active" data-filter="all">Todos</div>
      <div class="filter-chip" data-filter="income">Receitas</div>
      <div class="filter-chip" data-filter="expense">Despesas</div>
    </div>
    <div id="transactions-list"></div>
  </div>

  <!-- ============================================ -->
  <!-- PAGE: GOALS                                  -->
  <!-- ============================================ -->
  <div id="page-goals" class="page">
    <div class="section-title">
      <span><i class="fa-solid fa-bullseye"></i> Minhas Metas</span>
      <button class="see-all" onclick="openAddGoal()"><i class="fa-solid fa-plus"></i> Nova Meta</button>
    </div>
    <div class="goals-list" id="goals-list"></div>
  </div>

  <!-- ============================================ -->
  <!-- PAGE: REPORTS                                -->
  <!-- ============================================ -->
  <div id="page-reports" class="page">
    <div class="section-title">
      <span><i class="fa-solid fa-calendar"></i> Resumo Anual</span>
    </div>
    <div class="report-card" id="year-summary"></div>

    <div class="section-title">
      <span><i class="fa-solid fa-chart-bar"></i> Saldo por Mês</span>
    </div>
    <div class="report-card" id="month-comparison"></div>
  </div>

  <!-- ======= BOTTOM NAV ======= -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="dashboard">
      <i class="fa-solid fa-home"></i>
      <span>Início</span>
    </button>
    <button class="nav-item" data-page="transactions">
      <i class="fa-solid fa-list"></i>
      <span>Transações</span>
    </button>
    <button class="nav-item add-btn" onclick="openAddTransaction()">
      <div class="add-circle"><i class="fa-solid fa-plus"></i></div>
    </button>
    <button class="nav-item" data-page="goals">
      <i class="fa-solid fa-bullseye"></i>
      <span>Metas</span>
    </button>
    <button class="nav-item" data-page="reports">
      <i class="fa-solid fa-chart-line"></i>
      <span>Relatórios</span>
    </button>
  </nav>

  <!-- ======= MODAL: TRANSACTION ======= -->
  <div class="modal-overlay" id="transaction-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Nova Transação</h2>
        <button onclick="closeModal('transaction-modal')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="tx-type" value="expense">
        <input type="hidden" id="tx-category" value="">

        <div class="type-toggle">
          <button id="btn-type-income" onclick="updateTypeToggle('income')">
            <i class="fa-solid fa-arrow-up"></i> Receita
          </button>
          <button id="btn-type-expense" class="active-expense" onclick="updateTypeToggle('expense')">
            <i class="fa-solid fa-arrow-down"></i> Despesa
          </button>
        </div>

        <div class="form-group">
          <label>Categoria</label>
          <div class="category-grid" id="category-selector"></div>
        </div>

        <div class="form-group">
          <label>Descrição *</label>
          <input type="text" id="tx-description" placeholder="Ex: Salário, Aluguel...">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Valor *</label>
            <input type="number" id="tx-amount" placeholder="0,00" step="0.01" min="0">
          </div>
          <div class="form-group">
            <label>Data *</label>
            <input type="date" id="tx-date">
          </div>
        </div>

        <div class="form-group">
          <label>Responsável</label>
          <select id="tx-responsible">
            <option value="">Selecione</option>
            <option value="Geiza">Geiza</option>
            <option value="Elen">Elen</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-check">
            <input type="checkbox" id="tx-recurring">
            <label for="tx-recurring">Recorrente</label>
          </div>
          <div class="form-check">
            <input type="checkbox" id="tx-paid">
            <label for="tx-paid">Pago</label>
          </div>
        </div>

        <button class="btn-primary" onclick="saveTransaction()">
          <i class="fa-solid fa-check"></i> Salvar
        </button>
        <button class="btn-delete" id="btn-delete-tx" style="display:none" onclick="deleteTransaction()">
          <i class="fa-solid fa-trash"></i> Excluir Transação
        </button>
      </div>
    </div>
  </div>

  <!-- ======= MODAL: GOAL ======= -->
  <div class="modal-overlay" id="goal-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="goal-modal-title">Nova Meta</h2>
        <button onclick="closeModal('goal-modal')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Nome da Meta *</label>
          <input type="text" id="goal-name" placeholder="Ex: Reserva de Emergência">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Valor Alvo *</label>
            <input type="number" id="goal-target" placeholder="0,00" step="0.01" min="0">
          </div>
          <div class="form-group">
            <label>Valor Atual</label>
            <input type="number" id="goal-current" placeholder="0,00" step="0.01" min="0" value="0">
          </div>
        </div>
        <div class="form-group">
          <label>Prazo</label>
          <input type="date" id="goal-deadline">
        </div>
        <button class="btn-primary" onclick="saveGoal()">
          <i class="fa-solid fa-check"></i> Salvar Meta
        </button>
        <button class="btn-delete" id="btn-delete-goal" style="display:none" onclick="deleteGoal()">
          <i class="fa-solid fa-trash"></i> Excluir Meta
        </button>
      </div>
    </div>
  </div>

  <!-- ======= TOAST ======= -->
  <div class="toast" id="toast"></div>

</div><!-- /.app-container -->

  <!-- ======= SCRIPTS ======= -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
